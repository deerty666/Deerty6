<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحايب ديرتي - POS المطور</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        
        /* لوحة التحكم */
        .admin-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 2; min-width: 350px; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .cat-box { position: relative; background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cat-box.active { background: #e67e22; border: 2px solid #fff; }
        
        /* زر الحذف */
        .delete-btn { position: absolute; top: -8px; right: -8px; background: #ff4757; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .item-card { position: relative; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .item-card:hover { transform: translateY(-3px); border-color: #e67e22; }

        /* 🖨️ إعدادات الطباعة - حل مشكلة القص الجانبي */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0 !important; margin: 0 !important; }
            
            #printArea { 
                width: 52mm !important; /* منطقة الأمان لضمان عدم القص */
                margin: 0 auto !important; /* توسيط الفاتورة في الورق */
                padding: 0 2mm !important;
                border: none !important;
            }
            
            #printArea * { text-align: center !important; } /* توسيط النصوص داخلياً */

            .item-row { 
                display: flex !important; 
                justify-content: space-between !important; 
                font-size: 10pt !important; 
                font-weight: bold; 
                border-bottom: 1px dashed #ccc;
                margin-bottom: 3px;
                direction: rtl !important;
            }
            
            .restaurant-logo { width: 35mm !important; height: auto !important; margin: 0 auto 5px !important; }
            .total-section { font-size: 14pt !important; border-top: 1px solid #000; margin-top: 5px; padding-top: 5px; }
            @page { size: 80mm auto; margin: 0; }
        }

        .print-only { display: none; }
        @media print { .print-only { display: block !important; } }
        .restaurant-logo { width: 100px; display: block; margin: 0 auto 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-panel no-print">
            <h3>📂 الأقسام (اضغط على 🗑️ للحذف)</h3>
            <div id="categoriesContainer" class="categories-grid"></div>
            <hr>
            <div id="itemsContainer" class="items-grid"></div>

            <div style="margin-top: 30px; background: #eee; padding: 15px; border-radius: 10px;">
                <h4>➕ إضافة جديد</h4>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input id="newCatName" placeholder="اسم القسم الجديد" style="flex:1; padding:10px;">
                    <button onclick="addCategory()" style="background:#2c3e50; color:white; border:none; padding:10px 20px; cursor:pointer;">إضافة قسم</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <select id="catSelect" style="padding:10px;"></select>
                    <input id="newItemName" placeholder="اسم الصنف" style="padding:10px;">
                    <input id="newItemPrice" type="number" placeholder="السعر" style="padding:10px;">
                    <button onclick="addItem()" style="background:#e67e22; color:white; border:none; padding:12px; font-weight:bold; cursor:pointer;">إضافة صنف للقسم</button>
                </div>
            </div>
        </div>

        <div id="printArea" class="admin-panel" style="flex: 1; min-width: 250px;">
            <div style="text-align: center;">
                <div style="border: 1px solid #000; padding: 3px; margin-bottom: 10px; font-weight: bold;">⚠️ فاتورة حجز مسبق</div>
                <img src="logo.png" alt="Logo" class="restaurant-logo">
                <h2 style="margin:5px 0; font-size: 18px;">🌹 مطعم سحايب ديرتي</h2>
                <p style="font-size: 12px; margin:0;">رقم الفاتورة: #<span id="invNum">1001</span></p>
                <div style="border-bottom: 1px solid #000; margin: 10px 0;"></div>
            </div>

            <div class="no-print">
                <input id="customerName" placeholder="اسم العميل" style="width:100%; padding:8px; margin-bottom:5px;">
                <input id="customerPhone" placeholder="رقم الجوال" style="width:100%; padding:8px; margin-bottom:5px;">
            </div>

            <div class="print-only" style="font-size: 11px; text-align: right;">
                <div id="pNameDisp"></div>
                <div id="pPhoneDisp"></div>
            </div>

            <div style="border-bottom: 1px dashed #000; margin: 10px 0;"></div>
            <div id="cartItems"></div>
            
            <div class="total-section">
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>رسوم التوصيل:</span>
                    <span id="deliveryVal">5.00</span>
                </div>
                <div style="font-weight: bold; font-size: 18px; margin-top: 5px;">الإجمالي: <span id="totalPrice">0.00</span> ريال</div>
            </div>

            <div class="no-print" style="margin-top: 20px;">
                <button onclick="printOrder()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;">🖨️ طباعة الفاتورة</button>
                <button onclick="clearCart()" style="width:100%; padding:10px; background:#f8f9fa; color:#666; border:1px solid #ddd; margin-top:10px; cursor:pointer;">🗑️ تفريغ السلة</button>
            </div>
        </div>
    </div>

    <script src="Script.js" defer></script>
</body>
</html>
