<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحايب ديرتي - POS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        .main { display: flex; gap: 15px; flex-wrap: wrap; }
        .panel { background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 20px; flex: 1; min-width: 300px; }
        .search-box { position: sticky; top: 0; z-index: 10; background: white; padding-bottom: 10px; }
        .search-box input { border: 2px solid #e67e22; background: #fffcf9; }
        .category-header { background: #fff3e0; padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffe0b2; }
        .items-container { display: none; padding: 5px 10px; border-right: 2px solid #e67e22; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; color: #222; border-bottom: 2px solid #e67e22; padding-bottom: 5px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        button { background: #e67e22; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .qty-btn { background: #f39c12; width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 5px; color: white; border: none; font-weight: bold; cursor: pointer; }
        .add-btn { background: #2980b9; padding: 5px 12px; width: auto; color: white; border-radius: 5px; cursor: pointer; border: none; }
        .del-item-btn { background: #e74c3c; padding: 5px 10px; width: auto; font-size: 12px; color: white; border-radius: 5px; cursor: pointer; border: none; }
        .total { font-size: 24px; font-weight: bold; color: #e67e22; text-align: center; margin-top: 10px; border-top: 2px solid #000; padding-top: 5px; }
        @media print {
            body * { visibility: hidden; background: white !important; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; right: 0; top: 0; width: 80mm; padding: 0 5mm; box-sizing: border-box; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            @page { size: 80mm auto; margin: 0; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="panel no-print">
                <div class="search-box">
                    <h3>🔍 البحث في المنيو</h3>
                    <input id="searchInput" placeholder="اكتب اسم الصنف..." oninput="filterMenu()">
                </div>
                <h3>📋 القائمة</h3>
                <div id="menuDisplay"></div>
                <br><hr><br>
                <h3>🛠️ إدارة الأصناف</h3>
                <input id="newCatName" placeholder="اسم القسم الجديد">
                <button onclick="addCategory()" style="background:#2c3e50;">➕ إضافة قسم</button>
                <hr>
                <select id="catSelect"></select>
                <input id="newItemName" placeholder="اسم الصنف">
                <input id="newItemPrice" type="number" placeholder="السعر">
                <button onclick="addItem()" style="background:#2c3e50;">🍔 إضافة صنف جديد</button>
            </div>

            <div id="printArea" class="panel">
                <div style="text-align: center;">
                    <span style="font-size: 12px; font-weight: bold;">رقم: #<span id="invNum">1001</span></span>
                    <h2 style="margin:5px 0;">مطعم سحايب ديرتي 🍽️</h2>
                    <p style="font-size: 14px; font-weight: bold;">هاتف: 0112020203 📞</p>
                    <div style="border-bottom: 1px dashed #000; margin: 8px 0;"></div>
                </div>
                <h3>👤 بيانات العميل</h3>
                <div class="no-print">
                    <input id="customerName" placeholder="اسم العميل" oninput="syncPrintData()">
                    <input id="customerPhone" placeholder="رقم الجوال (للواتساب)" oninput="syncPrintData()">
                    <input id="customerLocation" placeholder="الموقع / الحي" oninput="syncPrintData()">
                    <textarea id="customerNotes" placeholder="ملاحظات عامة..." oninput="syncPrintData()"></textarea>
                </div>
                <table style="width:100%; font-size:12px;" class="print-only">
                    <tr><td><b>العميل:</b> <span id="pName">---</span></td></tr>
                    <tr><td><b>الجوال:</b> <span id="pPhone">---</span></td></tr>
                    <tr><td><b>الموقع:</b> <span id="pLoc">---</span></td></tr>
                    <tr><td><b>ملاحظة:</b> <span id="pNotes">---</span></td></tr>
                </table>
                <div style="border-bottom: 1px dashed #000; margin: 10px 0;"></div>
                <h3>🛒 الطلبات</h3>
                <div id="cartItems"></div>
                <div style="margin-top: 15px; border-top: 1px solid #000; padding-top: 5px;">
                    <div style="display: flex; justify-content: space-between; font-size: 14px;">
                        <span>رسوم التوصيل:</span>
                        <span id="pDelivery">5.00 ريال</span>
                        <input class="no-print" id="deliveryFee" type="number" value="5" oninput="updateCart()" style="width:60px;">
                    </div>
                </div>
                <div class="total">الإجمالي: <span id="totalPrice">0.00</span> ريال</div>
                <div class="no-print">
                    <button onclick="printOrder()" style="background:#27ae60; margin-top:10px;">🖨️ طباعة الفاتورة</button>
                    <button onclick="sendWhatsApp()" style="background:#25D366;">📲 إرسال واتساب</button>
                    <button onclick="clearCart()" style="background:#e74c3c;">🗑️ مسح السلة</button>
                </div>
            </div>
        </div>
    </div>
    <script src="Script.js" defer></script>
</body>
</html>
