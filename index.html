<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سحايب ديرتي POS - مطور</title>

<style>
body{ font-family:tahoma; background:#f5f5f5; margin:0; padding:10px; }
.container{ display:flex; gap:10px; flex-wrap:wrap; }
.panel{ background:#fff; padding:15px; border-radius:15px; flex:1; min-width:320px; }

/* الأقسام */
.cat{ display:inline-block; padding:10px; margin:5px; background:#2c3e50; color:#fff; border-radius:10px; cursor:pointer; min-width:90px; text-align:center; font-size:12px; position:relative; }
.cat .btns{ position:absolute; top:2px; left:2px; display:flex; gap:2px; }
.cat button, .item button.del, .item button.edit-btn { border:none; border-radius:50%; width:18px; height:18px; cursor:pointer; color:#fff; font-size:10px; }
.btn-del{ background:red; }
.btn-edit{ background:green; }

.active{ background:#e67e22 }

/* الأصناف */
.item{ display:inline-block; width:120px; padding:10px; margin:5px; border-radius:10px; border:1px solid #ddd; cursor:pointer; position:relative; text-align:center; font-size:13px; }
.item .item-btns { position:absolute; top:4px; left:4px; display:flex; gap:2px; }

/* السلة */
.line{ display:flex; justify-content:space-between; margin:5px 0; }

@media print{
.no-print{ display:none }
#printArea{ width:78mm; padding:5mm; font-size:12px; }
hr{ border-top:1px dashed #000; }
.center{ text-align:center }
.logo{ width:60px; margin:auto; display:block; }
}
</style>
</head>

<body>

<div class="container">
<div class="panel no-print">
<h3>📂 الأقسام</h3>
<div id="cats"></div>

<h3>🍔 الأصناف</h3>
<div id="items"></div>

<hr>
<input id="catName" placeholder="اسم القسم الجديد">
<button onclick="addCat()">➕ إضافة قسم</button>
<br><br>
<select id="catSelect"></select>
<input id="itemName" placeholder="اسم الصنف">
<input id="itemPrice" type="number" placeholder="السعر">
<button onclick="addItem()">➕ إضافة صنف</button>
</div>

<div class="panel" id="printArea">
<div class="center">
<img src="logo.png" class="logo">
<h2>سحايب ديرتي</h2>
<p>📞 0112020203</p>
<p>فاتورة حجز مؤقتة</p>
<p>رقم: <span id="inv">1001</span></p>
<hr>
</div>

<div class="no-print">
<input id="cName" placeholder="اسم العميل">
<input id="cPhone" placeholder="رقم الجوال (05xxxx)">
<input id="cLoc" placeholder="الموقع">
</div>

<div id="cart"></div>
<hr>
<div class="line">
<span>الإجمالي</span>
<span id="totalDisplay">0</span>
</div>

<div class="center" style="margin-top:10px"> 💙 شكراً لزيارتكم 💙 </div>

<div class="no-print">
<button onclick="window.print()">🖨️ طباعة</button>
<button onclick="sendWhats()">📲 واتساب مباشر</button>
<button onclick="clearCart()">🗑️ تفريغ</button>
</div>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("menu")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let activeCat = 0;
let inv = localStorage.getItem("inv") || 1001;

function save(){ localStorage.setItem("menu", JSON.stringify(data)); }
function saveCart(){ localStorage.setItem("cart", JSON.stringify(cart)); }

function render(){
    document.getElementById("inv").innerText = inv;
    let catsDiv = document.getElementById("cats");
    let select = document.getElementById("catSelect");
    catsDiv.innerHTML = "";
    select.innerHTML = "";

    data.forEach((c, i) => {
        catsDiv.innerHTML += `
        <div class="cat ${i === activeCat ? 'active' : ''}" onclick="openCat(${i})">
            <div class="btns">
                <button class="btn-del" onclick="deleteCat(${i});event.stopPropagation()">×</button>
                <button class="btn-edit" onclick="editCat(${i});event.stopPropagation()">✎</button>
            </div>
            ${c.name}
        </div>`;
        select.innerHTML += `<option value="${i}">${c.name}</option>`;
    });
    showItems();
    updateCart();
}

function openCat(i){ activeCat = i; render(); }

function showItems(){
    let itemsDiv = document.getElementById("items");
    itemsDiv.innerHTML = "";
    if(!data[activeCat]) return;

    data[activeCat].items.forEach((it, idx) => {
        itemsDiv.innerHTML += `
        <div class="item" onclick="addCart('${it.name}', ${it.price})">
            <div class="item-btns">
                <button class="btn-del" onclick="deleteItem(${idx});event.stopPropagation()">×</button>
                <button class="btn-edit" onclick="editItem(${idx});event.stopPropagation()">✎</button>
            </div>
            ${it.name}<br>${it.price} ر.س
        </div>`;
    });
}

function addCat(){
    let n = document.getElementById("catName").value;
    if(n){ data.push({name:n, items:[]}); save(); render(); document.getElementById("catName").value=""; }
}

function editCat(i){
    let newName = prompt("تعديل اسم القسم:", data[i].name);
    if(newName){ data[i].name = newName; save(); render(); }
}

function deleteCat(i){
    if(confirm("حذف القسم نهائياً؟")){ data.splice(i, 1); activeCat = 0; save(); render(); }
}

function addItem(){
    let c = document.getElementById("catSelect").value;
    let n = document.getElementById("itemName").value;
    let p = document.getElementById("itemPrice").value;
    if(n && p && c !== ""){
        data[c].items.push({ name: n, price: parseFloat(p) });
        save(); render();
        document.getElementById("itemName").value=""; document.getElementById("itemPrice").value="";
    }
}

function editItem(i){
    let item = data[activeCat].items[i];
    let newName = prompt("اسم الصنف الجديد:", item.name);
    let newPrice = prompt("السعر الجديد:", item.price);
    if(newName && newPrice){
        data[activeCat].items[i] = { name: newName, price: parseFloat(newPrice) };
        save(); render();
    }
}

function deleteItem(i){
    if(confirm("حذف الصنف؟")){ data[activeCat].items.splice(i, 1); save(); render(); }
}

function addCart(name, price){
    let f = cart.find(i => i.name === name);
    if(f) f.qty++;
    else cart.push({ name, price, qty: 1, note: "" });
    saveCart(); updateCart();
}

function updateCart(){
    let div = document.getElementById("cart");
    let totalDisplay = document.getElementById("totalDisplay");
    div.innerHTML = "";
    let total = 0;
    cart.forEach((i, index) => {
        total += i.price * i.qty;
        div.innerHTML += `
        <div class="line">
            <span>${i.name} × ${i.qty}</span>
            <span>${(i.price * i.qty).toFixed(2)}</span>
        </div>
        ${i.note ? `<small>📝 ${i.note}</small><br>` : ""}
        <div class="no-print">
            <button onclick="changeQty(${index}, 1)">+</button>
            <button onclick="changeQty(${index}, -1)">-</button>
            <button onclick="addNote(${index})">📝</button>
            <button onclick="removeItem(${index})">❌</button>
        </div><hr>`;
    });
    totalDisplay.innerText = total.toFixed(2);
}

function changeQty(i, c){
    cart[i].qty += c;
    if(cart[i].qty < 1) cart[i].qty = 1;
    saveCart(); updateCart();
}

function removeItem(i){ cart.splice(i, 1); saveCart(); updateCart(); }

function addNote(i){
    let n = prompt("اكتب الملاحظة:", cart[i].note);
    if(n !== null){ cart[i].note = n; saveCart(); updateCart(); }
}

function clearCart(){ if(confirm("تفريغ السلة؟")){ cart = []; saveCart(); updateCart(); }}

function sendWhats(){
    let phone = document.getElementById("cPhone").value.trim();
    if(!phone){ alert("يرجى إدخال رقم جوال العميل أولاً"); return; }
    if(phone.startsWith("0")) phone = phone.substring(1);

    let msg = "🧾 *سحايب ديرتي*%0A";
    msg += `👤 العميل: ${document.getElementById("cName").value || "غير مسجل"}%0A`;
    msg += `📍 الموقع: ${document.getElementById("cLoc").value || "-"}%0A----------------%0A`;

    cart.forEach(i => {
        msg += `🍔 *${i.name}* %0A العدد: ${i.qty} | السعر: ${(i.price * i.qty).toFixed(2)} ر.س%0A`;
        if(i.note) msg += `📝 ملاحظة: ${i.note}%0A`;
        msg += "%0A";
    });

    msg += "----------------%0A";
    msg += `💰 *الإجمالي: ${document.getElementById("totalDisplay").innerText} ر.س*%0A`;
    msg += "💙 شكراً لزيارتكم 💙";

    window.open(`https://wa.me/966${phone}?text=${msg}`);
}

render();
</script>
</body>
</html>
