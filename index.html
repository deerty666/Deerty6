<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سحايب ديرتي</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e67e22">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:Cairo;background:#f5f5f5;margin:0;padding:10px;}
.container {display:flex;gap:10px;flex-wrap:wrap;}
.panel {background:#fff;padding:15px;border-radius:15px;flex:1;min-width:300px;}

.item {border:1px solid #ddd;padding:10px;margin:5px;border-radius:10px;cursor:pointer}
.cat {background:#2c3e50;color:#fff;padding:10px;margin:5px;border-radius:10px;cursor:pointer}
.active {background:#e67e22;}

button {padding:10px;border:none;border-radius:8px;margin-top:5px;cursor:pointer}

/* 🖨️ طباعة احترافية */
@media print {
body {background:#fff}
.no-print {display:none}
#printArea {width:78mm;font-size:12px}

.line {display:flex;justify-content:space-between}
.center {text-align:center}
hr {border-top:1px dashed #000}
}
</style>
</head>

<body>

<div class="container">

<!-- المنيو -->
<div class="panel no-print">
<h3>الأقسام</h3>
<div id="cats"></div>

<h3>الأصناف</h3>
<div id="items"></div>

<input id="catName" placeholder="قسم جديد">
<button onclick="addCat()">إضافة قسم</button>

<input id="itemName" placeholder="اسم صنف">
<input id="itemPrice" placeholder="سعر">
<button onclick="addItem()">إضافة صنف</button>
</div>

<!-- الفاتورة -->
<div class="panel" id="printArea">

<div class="center">
<h2>سحايب ديرتي</h2>
<p>فاتورة</p>
<hr>
</div>

<div id="cart"></div>

<hr>

<div class="line">
<span>الإجمالي</span>
<span id="total">0</span>
</div>

<div class="no-print">
<button onclick="printBill()">🖨️ طباعة</button>
<button onclick="sendWhats()">📲 واتساب</button>
</div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("m"))||[];
let cart = JSON.parse(localStorage.getItem("c"))||[];
let active=0;

function save(){localStorage.setItem("m",JSON.stringify(data))}
function saveC(){localStorage.setItem("c",JSON.stringify(cart))}

function render(){
let cats=document.getElementById("cats");
let items=document.getElementById("items");
cats.innerHTML=""; items.innerHTML="";

data.forEach((c,i)=>{
cats.innerHTML+=`<div class="cat ${i==active?'active':''}" onclick="active=${i};render()">${c.name}</div>`
})

if(data[active]){
data[active].items.forEach(it=>{
items.innerHTML+=`<div class="item" onclick="addCart('${it.name}',${it.price})">${it.name}<br>${it.price}</div>`
})
}

updateCart();
}

function addCat(){
let n=document.getElementById("catName").value;
if(n){data.push({name:n,items:[]});save();render()}
}

function addItem(){
let n=document.getElementById("itemName").value;
let p=document.getElementById("itemPrice").value;
if(n&&p){data[active].items.push({name:n,price:parseFloat(p)});save();render()}
}

function addCart(n,p){
let f=cart.find(i=>i.name==n);
if(f)f.qty++;
else cart.push({name:n,price:p,qty:1});
saveC(); updateCart();
}

function updateCart(){
let div=document.getElementById("cart");
div.innerHTML="";
let t=0;

cart.forEach(i=>{
t+=i.price*i.qty;
div.innerHTML+=`
<div class="line">
<span>${i.name} × ${i.qty}</span>
<span>${(i.price*i.qty).toFixed(2)}</span>
</div>`
});

document.getElementById("total").innerText=t.toFixed(2);
}

function printBill(){
window.print();
}

function sendWhats(){

let msg="🧾 *سحايب ديرتي*%0A----------------%0A";

cart.forEach(i=>{
msg+=`🍔 ${i.name} × ${i.qty} = ${(i.price*i.qty).toFixed(2)} ر.س%0A`;
});

msg+="----------------%0A";
msg+=`💰 *الإجمالي: ${document.getElementById("total").innerText} ر.س*`;

window.open("https://wa.me/?text="+msg);
}

render();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
