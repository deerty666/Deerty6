<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كاشير السواقين</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,Tahoma,sans-serif;
}

body{
    margin:0;
    background:#f3f4f6;
}

.topbar{
    background:#111827;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.menu-section,
.invoice-section{
    background:white;
    border-radius:14px;
    padding:15px;
}

.category-box{
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:12px;
    overflow:hidden;
}

.category-header{
    background:#1f2937;
    color:white;
    padding:14px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.items-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.item-card{
    color:white;
    padding:20px 10px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}

.item-price{
    margin-top:8px;
}

#cart{
    min-height:120px;
    border:1px dashed #ccc;
    border-radius:12px;
    padding:10px;
    margin-top:15px;
}

.cart-item{
    background:#f9fafb;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

.cart-item input{
    width:100%;
    margin-top:8px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

.qty-row{
    display:flex;
    gap:6px;
    margin-top:8px;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:active{
    transform:scale(.98);
}

.danger-btn{
    background:#dc2626;
}

.total-box{
    background:#111827;
    color:white;
    padding:15px;
    border-radius:12px;
    margin:15px 0;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.actions{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

select,
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:10px;
}

.invoice-card{
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:12px;
    padding:12px;
    margin-top:10px;
}

.invoice-actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:10px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    padding:15px;
}

.modal-content{
    background:white;
    max-width:800px;
    margin:auto;
    padding:15px;
    border-radius:14px;
    max-height:90vh;
    overflow:auto;
}

.admin-card{
    background:#f9fafb;
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

.admin-row{
    background:white;
    border:1px solid #ddd;
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

@media(max-width:800px){

.layout{
    grid-template-columns:1fr;
}

.actions{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header class="topbar">
    <h1>كاشير السواقين</h1>

    <div>
        <button onclick="openAdminModal()">إدارة الأصناف</button>

        <button onclick="deleteAllInvoices()" class="danger-btn">
            حذف فواتير آخر الليل
        </button>
    </div>
</header>

<div class="layout">

<section class="menu-section">

<h2>الأصناف</h2>

<div id="menuContainer"></div>

</section>

<section class="invoice-section">

<select id="driverSelect"></select>

<div id="cart"></div>

<div class="total-box">
    <span id="grandTotal">0.00 ر.س</span>
</div>

<div class="actions">

<button onclick="saveDriverInvoice()">
حفظ الفاتورة
</button>

<button onclick="printCurrentReceipt()">
طباعة
</button>

<button onclick="clearCart()">
مسح
</button>

</div>

<hr>

<h2>الفواتير المحفوظة</h2>

<select id="filterDriver" onchange="renderSavedInvoices()">
<option value="">كل السواقين</option>
</select>

<div id="savedInvoicesList"></div>

</section>

</div>

<div id="adminModal" class="modal">

<div class="modal-content">

<h2>إدارة الأصناف</h2>

<div class="admin-card">

<h3>إضافة قسم</h3>

<input id="newCatName" placeholder="اسم القسم">

<button onclick="addCategory()">
إضافة القسم
</button>

</div>

<div class="admin-card">

<h3>إضافة صنف</h3>

<select id="adminCatSelect"></select>

<input id="newItemNameAdmin" placeholder="اسم الصنف">

<input id="newItemPriceAdmin"
type="number"
step="0.01"
placeholder="السعر">

<button onclick="addItemFromAdmin()">
إضافة الصنف
</button>

</div>

<div class="admin-card">

<h3>الأقسام والأصناف</h3>

<div id="adminCategoriesList"></div>

</div>

<button onclick="closeAdminModal()" class="danger-btn">
إغلاق
</button>

</div>

</div>

<script>

let menu = JSON.parse(localStorage.getItem('menu')) || {

categories:[
"وجبات رئيسية",
"مشروبات",
"حلويات",
"مقبلات"
],

items:[

{id:1,name:"كبسة دجاج",price:25,category:"وجبات رئيسية"},
{id:2,name:"مندي لحم",price:55,category:"وجبات رئيسية"},
{id:3,name:"ماء",price:1,category:"مشروبات"},
{id:4,name:"بيبسي",price:3,category:"مشروبات"},
{id:5,name:"سلطة",price:7,category:"مقبلات"},
{id:6,name:"كنافة",price:10,category:"حلويات"}

]

};

let drivers = JSON.parse(localStorage.getItem('drivers')) || [

"فواد 1",
"الجابري 2",
"مروان 3",
"ناصر 4",
"لطف 5",
"مصلي 6",
"علي 7",
"مجاهد 8",
"سواق 9",
"سواق 10",
"سواق 11",
"سواق 12"

];

let cart = [];

let savedInvoices =
JSON.parse(localStorage.getItem('driverInvoices')) || [];

let editingInvoiceId = null;

let openCategory = null;

function saveMenu(){
localStorage.setItem('menu',JSON.stringify(menu));
}

function saveInvoices(){
localStorage.setItem('driverInvoices',JSON.stringify(savedInvoices));
}

function money(n){
return Number(n).toFixed(2);
}

function renderDrivers(){

const select =
document.getElementById('driverSelect');

const filter =
document.getElementById('filterDriver');

select.innerHTML =
'<option value="">اختر السواق</option>';

filter.innerHTML =
'<option value="">كل السواقين</option>';

drivers.forEach(driver=>{

let opt1=document.createElement('option');
opt1.value=driver;
opt1.textContent=driver;
select.appendChild(opt1);

let opt2=document.createElement('option');
opt2.value=driver;
opt2.textContent=driver;
filter.appendChild(opt2);

});

}

function getColor(index){

const colors=[
'#ef4444',
'#0ea5e9',
'#22c55e',
'#f59e0b',
'#8b5cf6',
'#14b8a6',
'#d946ef'
];

return colors[index % colors.length];

}

function renderMenu(){

const container =
document.getElementById('menuContainer');

container.innerHTML='';

menu.categories.forEach((cat,index)=>{

const isOpen =
openCategory === cat;

const box =
document.createElement('div');

box.className='category-box';

box.innerHTML=`

<div class="category-header"
onclick="toggleCategory('${cat}')">

<strong>${cat}</strong>

<span>
${isOpen ? '▲':'▼'}
</span>

</div>

`;

const items=document.createElement('div');

items.className='items-grid';

items.style.display=
isOpen ? 'grid':'none';

menu.items
.filter(i=>i.category===cat)
.forEach(item=>{

const card=document.createElement('div');

card.className='item-card';

card.style.background=
getColor(index);

card.innerHTML=`

<div>${item.name}</div>

<div class="item-price">
${money(item.price)} ر.س
</div>

`;

card.onclick=()=>addToCart(item);

items.appendChild(card);

});

box.appendChild(items);

container.appendChild(box);

});

}

function toggleCategory(cat){

openCategory =
openCategory === cat ? null : cat;

renderMenu();

}

function addToCart(item){

const existing =
cart.find(i=>i.id===item.id);

if(existing){

existing.qty += 1;

}else{

cart.push({
...item,
qty:1,
note:''
});

}

renderCart();

}

function renderCart(){

const box =
document.getElementById('cart');

box.innerHTML='';

if(cart.length===0){

box.innerHTML=
'<p>لا توجد أصناف</p>';

}

cart.forEach((item,index)=>{

const total =
item.price * item.qty;

const div =
document.createElement('div');

div.className='cart-item';

div.innerHTML=`

<strong>${item.name}</strong>

<br>

${item.qty} ×
${money(item.price)}

=

${money(total)} ر.س

<input type="text"
placeholder="ملاحظة"
value="${item.note}"

onchange="
cart[${index}].note=this.value
">

<div class="qty-row">

<button onclick="
changeQty(${index},1)
">+</button>

<button onclick="
changeQty(${index},-1)
">-</button>

<button onclick="
removeItem(${index})
" class="danger-btn">
حذف
</button>

</div>

`;

box.appendChild(div);

});

updateTotal();

}

function changeQty(index,delta){

cart[index].qty += delta;

if(cart[index].qty < 1){

cart.splice(index,1);

}

renderCart();

}

function removeItem(index){

cart.splice(index,1);

renderCart();

}

function updateTotal(){

const total =
cart.reduce((sum,item)=>{

return sum + item.price * item.qty;

},0);

document.getElementById('grandTotal')
.textContent =
money(total)+' ر.س';

}

function clearCart(){

if(confirm('مسح الفاتورة؟')){

cart=[];

editingInvoiceId=null;

renderCart();

}

}

function saveDriverInvoice(){

const driver =
document.getElementById('driverSelect').value;

if(!driver)
return alert('اختر السواق');

if(cart.length===0)
return alert('الفاتورة فاضية');

const invoice={

id:
editingInvoiceId || Date.now(),

driver,

date:
new Date().toLocaleString('ar-SA'),

items:
JSON.parse(JSON.stringify(cart)),

total:
cart.reduce((s,i)=>{

return s + i.price * i.qty;

},0)

};

if(editingInvoiceId){

const index =
savedInvoices.findIndex(i=>{

return i.id===editingInvoiceId;

});

savedInvoices[index]=invoice;

editingInvoiceId=null;

alert('تم تعديل الفاتورة');

}else{

savedInvoices.push(invoice);

alert('تم حفظ الفاتورة');

}

saveInvoices();

cart=[];

renderCart();

renderSavedInvoices();

}

function renderSavedInvoices(){

const box =
document.getElementById('savedInvoicesList');

const filter =
document.getElementById('filterDriver').value;

box.innerHTML='';

let list =
savedInvoices.slice().reverse();

if(filter){

list =
list.filter(i=>i.driver===filter);

}

list.forEach(invoice=>{

const div =
document.createElement('div');

div.className='invoice-card';

let items='';

invoice.items.forEach(item=>{

items += `
${item.name}
× ${item.qty}
= ${money(item.price*item.qty)} ر.س
<br>
`;

});

div.innerHTML=`

<strong>
${invoice.driver}
</strong>

<br>

<small>
${invoice.date}
</small>

<br><br>

<strong>
الإجمالي:
${money(invoice.total)} ر.س
</strong>

<div style="margin-top:10px;">
${items}
</div>

<div class="invoice-actions">

<button onclick="
editSavedInvoice(${invoice.id})
">
تعديل
</button>

<button onclick="
printSavedInvoice(${invoice.id})
">
طباعة
</button>

<button onclick="
deleteSavedInvoice(${invoice.id})
" class="danger-btn">
حذف
</button>

</div>

`;

box.appendChild(div);

});

}

function editSavedInvoice(id){

const invoice =
savedInvoices.find(i=>i.id===id);

cart =
JSON.parse(JSON.stringify(invoice.items));

editingInvoiceId=id;

document.getElementById('driverSelect')
.value = invoice.driver;

renderCart();

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function deleteSavedInvoice(id){

if(!confirm('حذف الفاتورة؟'))
return;

savedInvoices =
savedInvoices.filter(i=>i.id!==id);

saveInvoices();

renderSavedInvoices();

}

function deleteAllInvoices(){

if(!confirm('حذف جميع الفواتير؟'))
return;

savedInvoices=[];

saveInvoices();

renderSavedInvoices();

}

function buildReceipt(invoice){

let html=`

<div style="
width:80mm;
margin:auto;
padding:4mm;
font-family:Arial;
direction:rtl;
text-align:right;
font-size:13px;
">

<div style="text-align:center;">

<h2>سحايب ديرتي</h2>

<div style="
border:2px solid #000;
padding:6px;
margin:8px 0;
font-weight:bold;
">

فاتورة سواق

</div>

<p>
السواق:
${invoice.driver}
</p>

<p>
${invoice.date}
</p>

</div>

<hr>

`;

invoice.items.forEach(item=>{

html += `

<div style="margin:6px 0;">

<strong>
${item.name}
</strong>

×

${item.qty}

=

${money(item.price*item.qty)}
ر.س

${item.note ?

'<br><small>ملاحظة: '
+ item.note +
'</small>'

:''}

</div>

`;

});

html += `

<hr>

<div style="
text-align:center;
font-size:18px;
font-weight:bold;
">

الإجمالي:
${money(invoice.total)} ر.س

</div>

</div>

`;

return html;

}

function printHtml(html){

const original =
document.body.innerHTML;

document.body.innerHTML=html;

window.print();

document.body.innerHTML=original;

setTimeout(()=>{

location.reload();

},500);

}

function printSavedInvoice(id){

const invoice =
savedInvoices.find(i=>i.id===id);

printHtml(
buildReceipt(invoice)
);

}

function printCurrentReceipt(){

const driver =
document.getElementById('driverSelect').value;

if(!driver)
return alert('اختر السواق');

if(cart.length===0)
return alert('الفاتورة فاضية');

const invoice={

driver,

date:
new Date().toLocaleString('ar-SA'),

items:
JSON.parse(JSON.stringify(cart)),

total:
cart.reduce((s,i)=>{

return s + i.price * i.qty;

},0)

};

printHtml(
buildReceipt(invoice)
);

}

function openAdminModal(){

document.getElementById('adminModal')
.style.display='block';

renderAdmin();

renderAdminSelect();

}

function closeAdminModal(){

document.getElementById('adminModal')
.style.display='none';

}

function renderAdminSelect(){

const select =
document.getElementById('adminCatSelect');

select.innerHTML='';

menu.categories.forEach(cat=>{

let opt=document.createElement('option');

opt.value=cat;

opt.textContent=cat;

select.appendChild(opt);

});

}

function renderAdmin(){

const box =
document.getElementById('adminCategoriesList');

box.innerHTML='';

menu.categories.forEach(cat=>{

const row =
document.createElement('div');

row.className='admin-row';

row.innerHTML=`

<strong>${cat}</strong>

<button onclick="
deleteCategory('${cat}')
" class="danger-btn">

حذف القسم

</button>

`;

box.appendChild(row);

menu.items
.filter(i=>i.category===cat)
.forEach(item=>{

const itemRow =
document.createElement('div');

itemRow.className='admin-row';

itemRow.innerHTML=`

<span>

${item.name}

-

${money(item.price)} ر.س

</span>

<div>

<button onclick="
editItem(${item.id})
">

تعديل

</button>

<button onclick="
deleteItem(${item.id})
" class="danger-btn">

حذف

</button>

</div>

`;

box.appendChild(itemRow);

});

});

}

function addCategory(){

const name =
document.getElementById('newCatName')
.value.trim();

if(!name)
return alert('اكتب اسم القسم');

menu.categories.push(name);

saveMenu();

renderMenu();

renderAdmin();

renderAdminSelect();

document.getElementById('newCatName')
.value='';

}

function deleteCategory(cat){

if(!confirm('حذف القسم؟'))
return;

menu.categories =
menu.categories.filter(c=>c!==cat);

menu.items =
menu.items.filter(i=>i.category!==cat);

saveMenu();

renderMenu();

renderAdmin();

renderAdminSelect();

}

function editItem(id){

const item =
menu.items.find(i=>i.id===id);

const name =
prompt('اسم الصنف',item.name);

const price =
parseFloat(
prompt('السعر',item.price)
);

if(name && !isNaN(price)){

item.name=name;

item.price=price;

saveMenu();

renderMenu();

renderAdmin();

}

}

function deleteItem(id){

if(!confirm('حذف الصنف؟'))
return;

menu.items =
menu.items.filter(i=>i.id!==id);

saveMenu();

renderMenu();

renderAdmin();

}

function addItemFromAdmin(){

const name =
document.getElementById('newItemNameAdmin')
.value.trim();

const price =
parseFloat(
document.getElementById('newItemPriceAdmin')
.value
);

const cat =
document.getElementById('adminCatSelect')
.value;

if(!name || !price || !cat)
return alert('املأ الحقول');

menu.items.push({

id:Date.now(),
name,
price,
category:cat

});

saveMenu();

renderMenu();

renderAdmin();

document.getElementById('newItemNameAdmin')
.value='';

document.getElementById('newItemPriceAdmin')
.value='';

}

document.addEventListener('DOMContentLoaded',()=>{

renderDrivers();

renderMenu();

renderCart();

renderSavedInvoices();

});

</script>

</body>
</html>
