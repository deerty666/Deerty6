<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحايب ديرتي - POS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 1400px; margin: 0 auto; }
        .main { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 20px; flex: 1; min-width: 320px; }
        
        /* الأقسام والأصناف */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .cat-box { background: #2c3e50; color: white; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cat-box.active { background: #e67e22; border-color: #d35400; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .item-card { background: #ffffff; border: 2px solid #dee2e6; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; position: relative; }
        .item-price-tag { color: #e67e22; font-weight: 800; background: #fff3e0; padding: 4px 10px; border-radius: 20px; font-size: 13px; }

        /* أزرار الكمية في السلة */
        .qty-btn { width: 30px; height: 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 18px; color: white; }
        .btn-plus { background: #27ae60; }
        .btn-minus { background: #e67e22; }

        /* إعدادات الطباعة 80mm */
        .restaurant-logo { width: 60px; height: 60px; object-fit: contain; margin: 0 auto; display: block; }
        .total { font-size: 22px; font-weight: bold; color: #e67e22; text-align: center; border-top: 2px solid #000; padding-top: 5px; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            #printArea { width: 74mm !important; margin: 0 auto !important; padding: 2mm !important; box-sizing: border-box; }
            .print-only { display: block !important; }
            @page { size: 80mm auto; margin: 0; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="panel no-print" style="flex: 2;">
                <h3>📂 الأقسام</h3>
                <div id="categoriesContainer" class="categories-grid"></div>
                <hr>
                <div id="itemsContainer" class="items-grid"></div>
                <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 12px; border: 1px solid #ddd;">
                    <input id="newCatName" placeholder="اسم قسم جديد" style="width:100%; padding:10px; margin-bottom:5px;">
                    <button onclick="addCategory()" style="width:100%; padding:10px; background:#34495e; color:white; border:none; border-radius:8px;">إضافة قسم</button>
                    <select id="catSelect" style="width:100%; padding:10px; margin:10px 0; border-radius:8px;"></select>
                    <input id="newItemName" placeholder="اسم الصنف" style="width:100%; padding:10px; margin-bottom:5px;">
                    <input id="newItemPrice" type="number" placeholder="السعر" style="width:100%; padding:10px; margin-bottom:5px;">
                    <button onclick="addItem()" style="width:100%; padding:10px; background:#e67e22; color:white; border:none; border-radius:8px;">إضافة صنف</button>
                </div>
            </div>

            <div id="printArea" class="panel">
                <div style="text-align: center; border: 1px solid #000; padding: 5px; margin-bottom: 10px; border-radius: 5px;">
                    <h3 style="margin:0; font-size: 14px;">⚠️ فاتورة حجز مسبق مؤقتة</h3>
                </div>
                <div style="text-align: center;">
                    <img src="logo.png" alt="Logo" class="restaurant-logo">
                    <h2 style="margin:5px 0; font-size: 16px; color: #e67e22;">مطعم سحايب ديرتي</h2>
                    <p style="font-size: 11px;">رقم الفاتورة: #<span id="invNum">1001</span></p>
                    <div style="border-bottom: 1px solid #000; margin: 5px 0;"></div>
                </div>

                <div class="no-print">
                    <input id="customerName" placeholder="اسم العميل" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px; border:1px solid #ccc;">
                    <input id="customerPhone" placeholder="رقم الجوال" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px; border:1px solid #ccc;">
                    <input id="customerLocation" placeholder="الموقع" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px; border:1px solid #ccc;">
                    <input id="customerTime" type="datetime-local" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
                </div>

                <div class="print-only" style="font-size: 12px; line-height: 1.5;">
                    <div id="pNameDisp"></div>
                    <div id="pPhoneDisp"></div>
                    <div id="pLocDisp"></div>
                    <div id="pTimeDisp"></div>
                </div>

                <div style="border-bottom: 1px dashed #000; margin: 5px 0;"></div>
                <div id="cartItems"></div>
                
                <div style="border-top: 1px solid #000; margin-top: 10px; padding-top: 5px;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span>توصيل:</span>
                        <input class="no-print" id="deliveryFee" type="number" value="5" oninput="updateCart()" style="width:50px; height:22px;">
                        <span id="pDelivery">5.00 ريال</span>
                    </div>
                    <div class="total">الإجمالي: <span id="totalPrice">0.00</span> ريال</div>
                </div>

                <div class="no-print" style="margin-top: 15px;">
                    <button onclick="printOrder()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; font-size:16px;">🖨️ طباعة الفاتورة</button>
                    <button onclick="sendWhatsApp()" style="width:100%; padding:12px; background:#25D366; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:8px;">📲 إرسال واتساب</button>
                    <button onclick="clearCart()" style="width:100%; padding:10px; background:#eee; color:#333; border:none; border-radius:10px; margin-top:8px; cursor:pointer;">🗑️ مسح السلة</button>
                </div>
            </div>
        </div>
    </div>
    <script src="Script.js" defer></script>
</body>
</html>
