<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحايب ديرتي - نظام الفواتير</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 15px; flex-wrap: wrap; }
        .panel { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 15px; flex: 1; min-width: 320px; }
        
        /* تنسيق الأقسام والأصناف */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .cat-box { position: relative; background: #2c3e50; color: white; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cat-box.active { background: #e67e22; }
        .delete-icon { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; }

        /* أزرار الكمية في السلة */
        .qty-controls { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .qty-btn { width: 28px; height: 28px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; font-size: 18px; }
        .btn-plus { background: #27ae60; }
        .btn-minus { background: #e67e22; }

        /* 🖨️ الحل الجذري لمشكلة القص الجانبي */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0 !important; margin: 0 !important; }
            
            #printArea { 
                width: 48mm !important; /* تصغير المساحة لضمان بقاء النص بعيداً عن الحواف */
                margin: 0 auto !important; /* توسيط الكتلة في منتصف ورق الـ 80 ملم */
                padding: 0 2mm !important;
                box-sizing: border-box;
            }

            /* توسيط إجباري لكل العناصر لمنع ملامسة الحواف المقصوصة */
            #printArea * { 
                text-align: center !important; 
                word-wrap: break-word;
            }

            .item-row { 
                display: flex !important; 
                justify-content: space-between !important; 
                font-weight: bold; 
                font-size: 9pt !important; /* تصغير الخط قليلاً ليتناسب مع العرض الجديد */
                border-bottom: 1px dashed #000;
                margin-bottom: 3px;
                width: 100%;
            }

            .restaurant-logo { width: 35mm !important; height: auto !important; margin: 0 auto 5px !important; }
            .total-section { font-size: 13pt !important; border-top: 1px solid #000; margin-top: 5px; padding-top: 5px; }
            @page { size: 80mm auto; margin: 0; }
        }

        .print-only { display: none; }
        @media print { .print-only { display: block !important; } }
        .restaurant-logo { width: 100px; display: block; margin: 0 auto 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel no-print" style="flex: 2;">
            <div id="categoriesContainer" class="categories-grid"></div>
            <hr>
            <div id="itemsContainer" class="items-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;"></div>

            <div style="margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 10px;">
                <input id="newCatName" placeholder="قسم جديد" style="padding:8px; margin-bottom:5px;">
                <button onclick="addCategory()" style="background:#34495e; color:white; border:none; padding:8px;">+ إضافة قسم</button>
                <hr>
                <select id="catSelect" style="padding:8px; margin-bottom:5px; width:100%;"></select>
                <input id="newItemName" placeholder="اسم الصنف" style="padding:8px; margin-bottom:5px; width:100%;">
                <input id="newItemPrice" type="number" placeholder="السعر" style="padding:8px; margin-bottom:5px; width:100%;">
                <button onclick="addItem()" style="background:#e67e22; color:white; border:none; padding:10px; width:100%; font-weight:bold;">+ إضافة صنف</button>
            </div>
        </div>

        <div id="printArea" class="panel">
            <div style="text-align: center;">
                <div style="border: 1px solid #000; padding: 2px; font-size: 11px; font-weight: bold; margin-bottom: 5px;">⚠️ فاتورة حجز مسبق</div>
                <img src="logo.png" alt="Logo" class="restaurant-logo">
                <h3 style="margin:2px 0; font-size: 15px;">مطعم سحايب ديرتي</h3>
                <p style="font-size: 10px; margin:0;">رقم الفاتورة: #<span id="invNum">1001</span></p>
            </div>

            <div class="no-print" style="margin-top:10px;">
                <input id="customerName" placeholder="اسم العميل" style="width:94%; padding:5px; margin-bottom:3px;">
                <input id="customerPhone" placeholder="جوال (مثال: 053xxxx)" style="width:94%; padding:5px; margin-bottom:3px;">
                <input id="customerLoc" placeholder="الموقع" style="width:94%; padding:5px;">
            </div>

            <div class="print-only" style="font-size: 10px; margin-top:5px; text-align: right;">
                <div id="dispName"></div>
                <div id="dispPhone"></div>
                <div id="dispLoc"></div>
            </div>

            <div style="border-bottom: 1px dashed #000; margin: 8px 0;"></div>
            <div id="cartItems"></div>
            
            <div class="total-section">
                <div style="display: flex; justify-content: space-between; font-size: 11px;">
                    <span>رسوم التوصيل:</span>
                    <input class="no-print" id="deliveryInput" type="number" value="5" oninput="updateCart()" style="width:40px;">
                    <span id="dispDelivery">5.00</span>
                </div>
                <div style="font-weight: bold; font-size: 16px; margin-top: 5px;">الإجمالي: <span id="totalPrice">0.00</span> ريال</div>
            </div>

            <div class="no-print" style="margin-top: 15px;">
                <button onclick="printOrder()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🖨️ طباعة الفاتورة</button>
                <button onclick="sendWhatsApp()" style="width:100%; padding:12px; background:#25D366; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:8px; cursor:pointer;">📲 إرسال واتساب</button>
                <button onclick="clearCart()" style="width:100%; padding:8px; background:#eee; margin-top:8px; border:none; border-radius:8px; cursor:pointer;">🗑️ تفريغ السلة</button>
            </div>
        </div>
    </div>
    <script src="Script.js" defer></script>
</body>
</html>
