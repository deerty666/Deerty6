<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحايب ديرتي - نظام POS المطور</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; }
        .main { display: flex; gap: 15px; flex-wrap: wrap; }
        .panel { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 15px; flex: 1; min-width: 300px; }
        
        /* تصميم الأقسام والأصناف */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .cat-box { position: relative; background: #2c3e50; color: white; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cat-box.active { background: #e67e22; }
        .delete-cat { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; border: none; cursor: pointer; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .item-card { position: relative; background: #ffffff; border: 1px solid #ddd; border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .item-card:hover { border-color: #e67e22; }
        .delete-item { position: absolute; top: 5px; left: 5px; background: rgba(255,0,0,0.1); color: red; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 2px 5px; }

        /* أزرار السلة */
        .qty-btn { width: 30px; height: 30px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-plus { background: #27ae60; }
        .btn-minus { background: #e67e22; }

        /* 🖨️ إعدادات الطباعة الحرارية الصارمة */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0 !important; margin: 0 !important; }
            #printArea { 
                width: 65mm !important; 
                margin: 0 auto !important; 
                padding: 2mm !important; 
                box-sizing: border-box; 
                box-shadow: none;
            }
            .item-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; }
            .total { font-size: 16pt !important; border-top: 2px solid #000; margin-top: 5px; padding-top: 5px; text-align: center; }
            @page { size: 80mm auto; margin: 0; }
        }
        .print-only { display: none; }
        @media print { .print-only { display: block !important; } }
        .restaurant-logo { width: 50px; height: 50px; object-fit: contain; margin: 0 auto; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="panel no-print" style="flex: 2;">
                <h3 style="margin-top:0;">📂 الأقسام (اضغط مطولاً أو استخدم X للحذف)</h3>
                <div id="categoriesContainer" class="categories-grid"></div>
                <hr>
                <div id="itemsContainer" class="items-grid"></div>

                <div style="margin-top: 25px; padding: 15px; background: #f9f9f9; border: 1px solid #eee; border-radius: 10px;">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input id="newCatName" placeholder="اسم القسم الجديد" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ccc;">
                        <button onclick="addCategory()" style="padding:8px 15px; background:#34495e; color:white; border:none; border-radius:5px; cursor:pointer;">+ إضافة قسم</button>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <select id="catSelect" style="padding:8px; border-radius:5px; border:1px solid #ccc;"></select>
                        <input id="newItemName" placeholder="اسم الصنف" style="padding:8px; border-radius:5px; border:1px solid #ccc;">
                        <input id="newItemPrice" type="number" placeholder="السعر" style="padding:8px; border-radius:5px; border:1px solid #ccc;">
                        <button onclick="addItem()" style="padding:10px; background:#e67e22; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">+ إضافة صنف للقسم المختار</button>
                    </div>
                </div>
            </div>

            <div id="printArea" class="panel">
                <div style="text-align: center; border: 2px solid #000; padding: 4px; margin-bottom: 8px;">
                    <h3 style="margin:0; font-size: 14px;">⚠️ فاتورة حجز مؤقتة</h3>
                </div>
                
                <div style="text-align: center;">
                    <img src="logo.png" alt="Logo" class="restaurant-logo">
                    <h2 style="margin:5px 0; font-size: 18px;">مطعم سحايب ديرتي</h2>
                    <p style="font-size: 11px; margin:0;">رقم الفاتورة: #<span id="invNum">1001</span></p>
                    <div style="border-bottom: 1px solid #000; margin: 8px 0;"></div>
                </div>

                <div class="no-print">
                    <input id="customerName" placeholder="اسم العميل" style="width:100%; padding:6px; margin-bottom:4px;">
                    <input id="customerPhone" placeholder="رقم الجوال" style="width:100%; padding:6px; margin-bottom:4px;">
                    <input id="customerLocation" placeholder="الموقع" style="width:100%; padding:6px; margin-bottom:4px;">
                    <input id="customerTime" type="datetime-local" style="width:100%; padding:6px; margin-bottom:10px;">
                </div>

                <div class="print-only" style="font-size: 11px; line-height: 1.4;">
                    <div id="pNameDisp"></div>
                    <div id="pPhoneDisp"></div>
                    <div id="pLocDisp"></div>
                    <div id="pTimeDisp"></div>
                </div>

                <div style="border-bottom: 1px dashed #000; margin: 8px 0;"></div>
                <div id="cartItems"></div>
                
                <div style="border-top: 1px solid #000; margin-top: 10px; padding-top: 5px;">
                    <div style="display: flex; justify-content: space-between; font-size: 11px;">
                        <span>توصيل:</span>
                        <input class="no-print" id="deliveryFee" type="number" value="5" oninput="updateCart()" style="width:40px;">
                        <span id="pDelivery">5.00 ريال</span>
                    </div>
                    <div class="total">الإجمالي: <span id="totalPrice">0.00</span> ريال</div>
                </div>

                <div class="no-print" style="margin-top: 15px;">
                    <button onclick="printOrder()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;">🖨️ طباعة الفاتورة</button>
                    <button onclick="sendWhatsApp()" style="width:100%; padding:12px; background:#25D366; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:8px; cursor:pointer;">📲 واتساب</button>
                    <button onclick="clearCart()" style="width:100%; padding:8px; background:#f8f9fa; color:#666; border:1px solid #ddd; border-radius:8px; margin-top:8px; cursor:pointer;">🗑️ تفريغ السلة</button>
                </div>
            </div>
        </div>
    </div>
    <script src="Script.js" defer></script>
</body>
</html>
